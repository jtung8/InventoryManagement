# ---------------------------------------------------------------------------
# CI — Pull Request & Push Validation
# ---------------------------------------------------------------------------
# Runs on every PR and push to main.
# Three parallel jobs: frontend checks, backend checks, Docker build validation.
# Replaces the previous web-ci.yml (frontend-only).
# ---------------------------------------------------------------------------

name: CI

# ── Triggers ──────────────────────────────────────────────────────────────
# pull_request: validates any PR, regardless of target branch
# push to main: validates direct pushes / merged PRs on main
on:
  pull_request:
  push:
    branches: [main]

# ── Permissions ───────────────────────────────────────────────────────────
# Principle of least privilege: CI only needs to read the repo contents.
# No write access, no token permissions, no deployments.
permissions:
  contents: read

# ── Concurrency ──────────────────────────────────────────────────────────
# If you push 3 commits quickly, cancel the first 2 runs and only finish
# the latest. Saves runner minutes and avoids stale results.
# The group key includes the ref (branch name) so different branches
# don't cancel each other.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Jobs ──────────────────────────────────────────────────────────────────
jobs:

  # ╔═══════════════════════════════════════════════════════════════════════╗
  # ║ FRONTEND — Lint, Type-check, Build                                  ║
  # ╚═══════════════════════════════════════════════════════════════════════╝
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    # All `run:` steps execute from frontend/web/ by default,
    # so we don't need to cd into it in every step.
    defaults:
      run:
        working-directory: frontend/web

    steps:
      # 1. Clone the repository onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Node.js 20 (matches our Dockerfile: node:20-alpine)
      #    Caches npm packages so repeat runs skip downloading.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      # 3. Clean install from lockfile (deterministic, no version drift)
      - name: Install dependencies
        run: npm ci

      # 4. ESLint — catches code quality and React best-practice issues
      - name: Lint
        run: npm run lint

      # 5. TypeScript compiler — catches type mismatches across all files
      - name: Type-check
        run: npm run type-check

      # 6. Next.js production build — proves the app compiles successfully
      - name: Build
        run: npm run build

  # ╔═══════════════════════════════════════════════════════════════════════╗
  # ║ BACKEND — Lint, Format Check                                        ║
  # ╚═══════════════════════════════════════════════════════════════════════╝
  backend:
    name: Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Python 3.12 (matches our Dockerfile: python:3.12-slim)
      # Caches pip packages using the hash of both requirements files.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      # Install production deps + dev deps (ruff).
      # Production deps are included so ruff can resolve imports correctly.
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      # Ruff lint — catches unused imports, bugs, style issues
      - name: Lint
        run: ruff check .

      # Ruff format — verifies code formatting matches project standards.
      # --check means "report violations, don't auto-fix" (CI should never
      # modify code — it only reports pass/fail).
      - name: Format check
        run: ruff format --check .

  # ╔═══════════════════════════════════════════════════════════════════════╗
  # ║ DOCKER — Build Validation                                           ║
  # ╚═══════════════════════════════════════════════════════════════════════╝
  # Only runs after frontend + backend pass. No point building images
  # if the code itself is broken.
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build frontend image — validates the Dockerfile, npm install,
      # and next build all succeed inside the container.
      - name: Build frontend image
        run: docker build -t forestock-frontend:ci ./frontend/web

      # Build backend image — validates the Dockerfile and pip install
      # succeed inside the container.
      - name: Build backend image
        run: docker build -t forestock-backend:ci ./backend
